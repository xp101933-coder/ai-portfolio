    /* === CSS Variables — Electric Violet === */
    :root {
      /* Primary */
      --purple:        #845EC2;
      --purple-dark:   #6B4CA0;
      --purple-light:  #B39CD0;
      --purple-tint:   #FBEAFF;

      /* Cool Accent */
      --emerald:       #00C9A7;
      --mint-tint:     #C4FCEF;
      --teal:          #4D8076;

      /* Warm Accent */
      --coral:         #FF6F91;
      --salmon:        #FF9671;
      --gold:          #FFC75F;

      /* Neutrals */
      --plum-dark:     #2D1F4E;
      --plum-mid:      #4B4453;
      --lavender-gray: #B0A8B9;
      --warm-sand:     #D5CABD;

      /* Backgrounds */
      --bg:            #ffffff;
      --bg-off:        #faf9ff;
      --bg-tint:       #f0ebf8;

      /* Borders */
      --border:        #e8e0f0;
      --border-soft:   #f0ebf8;

      /* Gradients */
      --grad-warm:     linear-gradient(135deg, #845EC2 0%, #FF6F91 50%, #FFC75F 100%);
      --grad-brand:    linear-gradient(135deg, #845EC2, #00C9A7);
      --grad-subtle:   linear-gradient(135deg, #FBEAFF, #C4FCEF);

      /* Shadows */
      --shadow-sm:     0 2px 8px rgba(132,94,194,0.12);
      --shadow-md:     0 8px 32px rgba(132,94,194,0.18);
      --shadow-lg:     0 20px 60px rgba(45,31,78,0.22);
      --shadow-glow:   0 0 24px rgba(132,94,194,0.4);

      --radius-card:   12px;
      --radius-btn:    8px;
      --radius-modal:  16px;
      --radius-badge:  6px;

      --font: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--plum-dark);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* === Navbar — frosted glass === */
    #navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-size: 17px; font-weight: 800;
      letter-spacing: -0.02em;
      background: var(--grad-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      font-size: 14px; font-weight: 600; color: var(--plum-mid);
      letter-spacing: -0.01em;
      transition: color 0.25s var(--ease);
    }
    .nav-links a:hover { color: var(--purple); }
    .nav-cta {
      background: var(--purple);
      color: white !important;
      padding: 8px 20px;
      border-radius: var(--radius-btn);
      font-weight: 700; font-size: 13px;
      transition: background 0.25s var(--ease), box-shadow 0.25s var(--ease);
    }
    .nav-cta:hover {
      background: var(--purple-dark);
      box-shadow: var(--shadow-glow);
    }

    /* === Hero — warm gradient + generated image === */
    #hero {
      padding: 96px 48px 80px;
      text-align: center;
      background-image:
        linear-gradient(135deg, rgba(132,94,194,0.82) 0%, rgba(255,111,145,0.72) 50%, rgba(255,199,95,0.72) 100%),
        url('images/hero.png');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    #hero::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(45,31,78,0.08);
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 16px; border-radius: 20px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
    }
    .hero-title {
      font-size: clamp(32px, 5.5vw, 60px);
      font-weight: 800;
      color: white;
      line-height: 1.15;
      letter-spacing: -0.025em;
      margin-bottom: 16px;
    }
    .hero-title .accent {
      display: inline-block;
      background: linear-gradient(90deg, #fff, #C4FCEF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 48px;
      letter-spacing: -0.01em;
    }
    .hero-stats {
      display: inline-flex;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-card);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .hero-stat {
      padding: 20px 36px;
      text-align: center;
    }
    .hero-stat + .hero-stat { border-left: 1px solid rgba(255,255,255,0.25); }
    .hero-stat .num {
      font-size: 30px; font-weight: 800;
      color: white; line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero-stat .label {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* === Works Section === */
    #works {
      padding: 72px 48px 80px;
      max-width: 1200px; margin: 0 auto;
    }
    .section-heading {
      text-align: center; margin-bottom: 40px;
    }
    .section-divider {
      width: 48px; height: 3px;
      background: var(--grad-brand);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .section-heading h2 {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.02em; color: var(--plum-dark);
      margin-bottom: 4px;
    }
    .section-heading p {
      font-size: 13px; color: var(--lavender-gray);
      font-weight: 500;
    }

    /* Filter Bar */
    #filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 40px;
    }
    .filter-btn {
      font-family: var(--font);
      font-size: 13px; font-weight: 600;
      padding: 7px 18px;
      border-radius: var(--radius-btn);
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--plum-mid);
      cursor: pointer;
      transition: all 0.25s var(--ease);
    }
    .filter-btn:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-tint); }
    .filter-btn.active {
      background: var(--purple); border-color: var(--purple);
      color: white; box-shadow: var(--shadow-sm);
    }

    /* Card Grid */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* Cards */
    .project-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--purple-light);
    }
    .card-thumb {
      height: 130px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; position: relative;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-category-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      color: var(--purple);
      background: var(--purple-tint);
      padding: 3px 9px; border-radius: var(--radius-badge);
    }
    .card-body { padding: 18px; }
    .card-title {
      font-size: 14px; font-weight: 700;
      color: var(--plum-dark); margin-bottom: 5px;
      letter-spacing: -0.01em; line-height: 1.5;

    .card-summary {

    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .card-tag {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-tint); color: var(--lavender-gray);

    /* === Modal === */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(45,31,78,0.52);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: rgba(255,255,255,0.98);
      border-radius: var(--radius-modal);
      max-width: 620px; width: 100%; max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modal-in 0.3s var(--ease);
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-thumb {
      height: 220px;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px; position: relative;
      border-radius: var(--radius-modal) var(--radius-modal) 0 0;
    }
    .modal-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-modal) var(--radius-modal) 0 0; }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%; width: 32px; height: 32px;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.6);
      color: var(--plum-mid);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .modal-close:hover { background: white; box-shadow: var(--shadow-sm); }
    .modal-body { padding: 32px; }
    .modal-category {
      font-size: 11px; font-weight: 700;
      color: var(--emerald); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .modal-title {
      font-size: 22px; font-weight: 800;
      color: var(--plum-dark); margin-bottom: 6px;
      letter-spacing: -0.02em; line-height: 1.3;
    }
    .modal-divider {
      width: 40px; height: 3px;
      background: var(--grad-brand);
      border-radius: 2px; margin-bottom: 16px;
    }
    .modal-desc {
      font-size: 14px; color: var(--plum-mid);
      line-height: 1.8; margin-bottom: 20px;
    }
    .modal-tags-label {
      font-size: 10px; font-weight: 700;
      color: var(--lavender-gray); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
    .modal-tag {
      font-size: 12px; font-weight: 600; padding: 4px 12px;
      border-radius: var(--radius-badge);
      background: var(--purple-tint); color: var(--purple);
    }
    .modal-links { display: flex; gap: 10px; }
    .modal-link {
      flex: 1; text-align: center; font-size: 13px; font-weight: 700;
      padding: 11px; border-radius: var(--radius-btn);
      border: 1.5px solid var(--border); color: var(--plum-mid);
      cursor: pointer; font-family: var(--font);
      transition: all 0.25s var(--ease);
    }
    .modal-link:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-tint); }
    .modal-link.primary {
      background: var(--grad-brand); border-color: transparent; color: white;
    }
    .modal-link.primary:hover { opacity: 0.9; box-shadow: var(--shadow-md); }

    /* === Footer === */
    #footer {
      background: var(--plum-dark);
      padding: 48px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 20px;

    .footer-logo {

      background: var(--grad-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;

    }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a {
      font-size: 13px; font-weight: 600; color: var(--lavender-gray);
      transition: color 0.25s var(--ease);
    }
    .footer-links a:hover { color: var(--emerald); }
    .footer-copy {
      font-size: 11px; color: var(--plum-mid);
      width: 100%; text-align: center; margin-top: 4px;
      font-weight: 500;
    }

    /* === Responsive === */
    @media (max-width: 900px) {
      #card-grid { grid-template-columns: repeat(2, 1fr); }
      #navbar, #hero, #works, #footer { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 600px) {
      #card-grid { grid-template-columns: 1fr; }
      .nav-links a:not(.nav-cta) { display: none; }
      .hero-stat { padding: 16px 20px; }
      .hero-stat .num { font-size: 22px; }
      .modal-body { padding: 24px; }
      #footer { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>

    };

    const CATEGORIES = [
      { key: "all",         label: "All" },
      { key: "claude-code", label: "Claude Code" },
      { key: "claude-api",  label: "Claude API" },
      { key: "automation",  label: "Automation" },
      { key: "web-app",     label: "Web App" }
    ];

    /* ===== SCROLL ANIMATION ===== */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.06 });

    function observeCards() {
      document.querySelectorAll('.project-card').forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px)';
        card.style.transition = `opacity 0.5s ease ${i * 0.04}s, transform 0.5s ease ${i * 0.04}s`;
        observer.observe(card);
      });
    }

    /* ===== NAVBAR ===== */
    function renderNavbar() {
      document.getElementById('navbar').innerHTML = `
        <span class="nav-logo">takurou.ai</span>
        <nav class="nav-links">
          <a href="#works">Works</a>
          <a href="#footer" class="nav-cta">Contact</a>
        </nav>
      `;
    }

    /* ===== HERO ===== */
    function renderHero() {
      document.getElementById('hero-inner').innerHTML = `
        <div class="hero-badge">⚡ AI Developer</div>
        <h1 class="hero-title">AI × 自動化で<br><span class="accent">プロダクトを作る</span></h1>
        <p class="hero-sub">Claude Code &nbsp;·&nbsp; Claude API &nbsp;·&nbsp; 業務自動化 &nbsp;·&nbsp; LLMアプリ開発</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="num">${projects.length}<span style="font-size:18px;font-weight:700">+</span></div>
            <div class="label">Projects</div>
          </div>
          <div class="hero-stat">
            <div class="num">3<span style="font-size:18px;font-weight:700">+</span></div>
            <div class="label">AI Tools</div>
          </div>
          <div class="hero-stat">
            <div class="num" style="font-size:22px">2025</div>
            <div class="label">Year</div>
          </div>
        </div>
      `;
    }

    /* ===== FILTER BAR ===== */
    let activeFilter = "all";

    function renderFilterBar() {
      document.getElementById('filter-bar').innerHTML =
        CATEGORIES.map(c =>
          `<button class="filter-btn ${activeFilter === c.key ? 'active' : ''}"
             onclick="setFilter('${c.key}')">${c.label}</button>`
        ).join('');
    }

    function setFilter(key) {
      activeFilter = key;
      renderFilterBar();
      renderCards();
    }

    /* ===== CARD GRID ===== */
    function renderCards() {
      const filtered = activeFilter === 'all'
        ? projects
        : projects.filter(p => p.category === activeFilter);

      document.getElementById('card-grid').innerHTML = filtered.map(p => `
        <div class="project-card" onclick="openModal(${p.id})">
          <div class="card-thumb" style="background:${p.color}">
            ${(p.image || CATEGORY_IMAGES[p.category]) ? `<img src="${p.image || CATEGORY_IMAGES[p.category]}" alt="${p.title}">` : `<span>${p.emoji}</span>`}
            <span class="card-category-badge">
              ${CATEGORIES.find(c => c.key === p.category)?.label || p.category}
            </span>
          </div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-summary">${p.summary}</div>
            <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
          </div>
        </div>
      `).join('');

      observeCards();
    }

    /* ===== MODAL ===== */
    function openModal(id) {
      const p = projects.find(x => x.id === id);
      if (!p) return;
      const overlay = document.getElementById('modal-overlay');
      overlay.style.display = 'flex';
      const hasLinks = p.links.github || p.links.x;
      overlay.innerHTML = `
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-thumb" style="background:${p.color}">
            ${(p.image || CATEGORY_IMAGES[p.category]) ? `<img src="${p.image || CATEGORY_IMAGES[p.category]}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover">` : p.emoji}
            <button class="modal-close" onclick="closeModal()">✕</button>
          </div>
          <div class="modal-body">
            <div class="modal-category">${CATEGORIES.find(c => c.key === p.category)?.label || p.category}</div>
            <div class="modal-title">${p.title}</div>
            <div class="modal-divider"></div>
            <div class="modal-desc">${p.description}</div>
            <div class="modal-tags-label">Tech Stack</div>
            <div class="modal-tags">${p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>
            <div class="modal-links">
              ${p.links.github ? `<a href="${p.links.github}" target="_blank" class="modal-link primary">GitHub →</a>` : ''}
              ${p.links.x ? `<a href="${p.links.x}" target="_blank" class="modal-link">𝕏 でシェア</a>` : ''}
              ${!hasLinks ? '<span class="modal-link" style="opacity:0.4;cursor:default">リンク準備中</span>' : ''}
            </div>
          </div>
        </div>
      `;
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.getElementById('modal-overlay').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ===== FOOTER ===== */
    function renderFooter() {
      document.getElementById('footer').innerHTML = `
        <span class="footer-logo">takurou.ai</span>
        <div class="footer-links">
          <a href="https://x.com/" target="_blank">𝕏 Twitter</a>
          <a href="https://github.com/" target="_blank">GitHub</a>
          <a href="https://note.com/" target="_blank">note</a>
        </div>
        <div class="footer-copy">© 2025 takurou — Built with Claude Code</div>
      `;
    }

    /* ===== INIT ===== */
    renderNavbar();
    renderHero();
    renderFilterBar();
    renderCards();
    renderFooter();
  </script>
</body>
</html>
